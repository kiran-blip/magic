version: "3.8"

services:
  gold-digger:
    build: ./app
    ports:
      - "3000:3000"
    volumes:
      - golddigger-data:/app/data
    environment:
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-magic123}
      - JWT_SECRET=${JWT_SECRET:-magic-computer-secret-change-me}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GOLDDIGGER_ROUTING=${GOLDDIGGER_ROUTING:-auto}
      - GOLDDIGGER_DATA_DIR=/app/data
      - OPENCLAW_API_URL=${OPENCLAW_API_URL:-http://host.docker.internal:11434}
    restart: unless-stopped
    networks:
      - golddigger-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/golddigger/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  golddigger-data:
    driver: local

networks:
  golddigger-network:
    driver: bridge
    name: golddigger-network
